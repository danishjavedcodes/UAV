# HMAY-TSF Training Configuration
# Optimized for class imbalance handling in object detection

# Model Configuration
model_size: 's'  # 'n', 's', 'm', 'l', 'x'
num_classes: 11
pretrained: true
img_size: 640

# Training Configuration
batch_size: 16
epochs: 100
lr: 0.001
weight_decay: 0.0005
num_workers: 4
patience: 10

# Class Balancing Configuration
focal_alpha: 1.0
focal_gamma: 2.0
target_samples_per_class: 5000

# Data Augmentation
use_super_resolution: false
copy_paste_augmentation: true
active_learning: false

# Advanced Training Options
gradient_clip: 10.0
warmup_epochs: 5
cosine_annealing: true
label_smoothing: 0.1

# Loss Weights (YOLO-style)
box_loss_weight: 7.5
cls_loss_weight: 0.5
dfl_loss_weight: 1.5

# Validation
val_frequency: 1
save_frequency: 5

# Output Configuration
output_dir: './runs/hmay_tsf_training'
save_best_only: true
save_last: true

# Logging
tensorboard: true
log_frequency: 10
plot_class_distribution: true

# Resume Training
resume_training: false
checkpoint_path: null

# Hardware Configuration
device: 'auto'  # 'auto', 'cuda', 'cpu'
mixed_precision: true
compile_model: false  # PyTorch 2.0+ feature

# Dataset Configuration
data_yaml: 'dataset/dataset.yaml'
train_split: 0.8
val_split: 0.2

# Class-specific configurations
class_weights:
  # These will be automatically calculated based on class distribution
  # but can be manually overridden here
  auto_calculate: true
  
# Temporal-Spatial Fusion Configuration
tsf_enabled: true
tsf_sequence_length: 8
tsf_attention_heads: 16

# Super-Resolution Configuration
sr_enabled: false
sr_scale_factor: 2
sr_blocks: 12

# Adaptive Anchor Box Configuration
adaptive_anchors: true
num_anchors: 12
anchor_optimization: true 